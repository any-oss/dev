name: CI and Docker Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4

      - name: Locate package.json
        id: pkg
        run: |
          PKG=$(find . -name "package.json" -not -path "./node_modules/*" -not -path "./.git/*" | head -1)
          if [ -z "$PKG" ]; then
            echo "❌ No package.json found"
            exit 1
          fi
          DIR=$(dirname "$PKG")
          echo "✅ Found package.json in: $DIR"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ steps.pkg.outputs.dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          if [ -f "package-lock.json" ]; then npm ci; else npm install; fi

      - name: Run tests
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm test

      - name: Build
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm run build --if-present

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      REGISTRY: docker.io
      IMAGE_NAME: anydockerhub/dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: Sign the published Docker image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          if [[ -n "$TAGS" && -n "$DIGEST" ]]; then
            for tag in $TAGS; do
              cosign sign --yes "${tag}@${DIGEST}"
            done
          fi# Paste the whole script here
